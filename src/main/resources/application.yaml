server:
  servlet:
    context-path: /hometop

spring:
  application:
    name: onepass

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/onepass_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    encoding: UTF-8