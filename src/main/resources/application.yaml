server:
  servlet:
    context-path: /hometop

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/onepass_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  application:
    name: onepass

  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  thymeleaf:
    encoding: UTF-8