server:
  port: 8090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/onepass_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  # SQL 초기화 스크립트 설정
  sql:
    init:
      mode: never     # never: 스크립트 실행 안함 | always: 매 기동 시 실행
      encoding: UTF-8

  jpa:
    defer-datasource-initialization: true   # datasource 초기화 후 data.sql 실행(순서 보장)
    hibernate:
      ddl-auto: update
    show-sql: false    # 밑에 logging 로그정보에서 더 많은 데이터가 나오기때문에 sql 정보는 안나오게 설정

  thymeleaf:
    cache: false

logging:
  level:
   root: INFO      # 전체 기본 로그 레벨
   com.hometalk: DEBUG       # 프로젝트 패키지 - 상세 로그 출력 (디버그 레벨로 더 많이 나오게 함. 패키지는 hometalk)
   org.hibernate.SQL: DEBUG  # hibernate SQL 쿼리 로그